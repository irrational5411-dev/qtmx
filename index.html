<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Riyad 互换嵌套美学排版生成器 V3.1</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #FAF6F0; /* 奶油浅底色 */
            color: #4A3E3D; /* 焦糖深咖文字 */
            -webkit-tap-highlight-color: transparent;
            touch-action: none; /* 完美接管手势 */
        }

        /* 奶油感温润卡片阴影 */
        .cream-card {
            background-color: #FFFFFF;
            border: 1px solid #EFEAE2;
            box-shadow: 0 10px 30px -5px rgba(139, 115, 85, 0.08);
            border-radius: 20px;
        }

        .cream-button {
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .cream-button:active {
            transform: scale(0.96);
        }

        /* 胶片颗粒 */
        .grain-overlay {
            position: relative;
        }
        .grain-overlay::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.06'/%3E%3C/svg%3E");
            pointer-events: none;
            mix-blend-mode: overlay;
            z-index: 5;
            opacity: 0.06;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* 拖拽高亮标志 */
        .drag-highlight {
            box-shadow: 0 0 0 3px #D97706 !important;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col lg:flex-row overflow-hidden select-none">

    <!-- 1. UI 模块 (移动端顶部导航栏) -->
    <header class="lg:hidden shrink-0 bg-white/80 backdrop-blur-md border-b border-[#EFEAE2] px-4 py-3 flex items-center justify-between z-40">
        <div class="flex items-center gap-2">
            <span class="p-1.5 bg-[#8B7355] rounded-lg text-white">
                <i data-lucide="refresh-cw" class="w-4 h-4"></i>
            </span>
            <span class="text-sm font-bold tracking-wider text-[#4A3E3D]">RIYAD INVERSE v3.1</span>
        </div>
        <button onclick="LayerManager.loadSampleAssets()" class="text-xs bg-[#8B7355]/10 hover:bg-[#8B7355]/20 text-[#8B7355] border border-[#8B7355]/30 px-3 py-1.5 rounded-full font-medium flex items-center gap-1 transition-all cream-button">
            <i data-lucide="wand-2" class="w-3.5 h-3.5"></i>
            <span>美学样图</span>
        </button>
    </header>

    <!-- 1. UI 模块 (主画布舞台区) -->
    <div class="flex-1 flex items-center justify-center p-4 sm:p-6 relative overflow-hidden min-h-0">
        <!-- 氛围装饰光晕 -->
        <div class="absolute inset-0 overflow-hidden pointer-events-none opacity-40">
            <div class="absolute w-[250px] h-[250px] rounded-full bg-[#E8DCC4] blur-[80px] top-1/4 left-1/3 animate-pulse"></div>
            <div class="absolute w-[300px] h-[300px] rounded-full bg-[#E6D0BE] blur-[100px] bottom-1/4 right-1/4"></div>
        </div>

        <div id="workspace" class="relative bg-white shadow-[0_20px_50px_-15px_rgba(139,115,85,0.15)] overflow-hidden transition-all duration-300 flex items-center justify-center max-w-full max-h-full border border-[#EFEAE2]" style="width: 320px; height: 320px; border-radius: 12px;">
            
            <!-- 上传引导卡片 -->
            <div id="workspace-placeholder" class="absolute inset-0 flex flex-col items-center justify-center bg-[#FAF6F0]/95 z-30 gap-3.5 text-center px-6 transition-opacity duration-300">
                <div class="w-12 h-12 rounded-full bg-[#8B7355]/10 border border-[#8B7355]/20 flex items-center justify-center text-[#8B7355]">
                    <i data-lucide="sparkles" class="w-5 h-5"></i>
                </div>
                <div>
                    <h3 class="text-xs font-bold text-[#4A3E3D]">极简嵌套美学排版</h3>
                    <p class="text-[10px] text-zinc-500 mt-1 max-w-[200px] mx-auto leading-relaxed">
                        在下方上传图片，双指捏合或滚轮直接缩放任意图层，拖拽重合对齐。
                    </p>
                </div>
            </div>

            <!-- 双层对称平分大画幅 -->
            <div id="preview-stage" class="relative w-full h-full flex flex-col overflow-hidden grain-overlay">
                
                <!-- 上半容器 (50%) -->
                <div class="relative w-full h-1/2 overflow-hidden border-b border-black/10 cursor-move" id="part-top-bg">
                    <img id="stage-top-bg-img" src="" class="absolute w-full h-full object-cover select-none pointer-events-none opacity-0 origin-center">
                    
                    <!-- 上嵌套框 -->
                    <div id="center-box-top" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-white shadow-[0_4px_25px_rgba(139,115,85,0.2)] overflow-hidden cursor-move border border-white/10" style="width: 112px; height: 112px;">
                        <img id="stage-top-fg-img" src="" class="absolute w-full h-full object-cover select-none pointer-events-none opacity-0 origin-center">
                    </div>
                </div>

                <!-- 下半容器 (50%) -->
                <div class="relative w-full h-1/2 overflow-hidden cursor-move" id="part-bottom-bg">
                    <img id="stage-bottom-bg-img" src="" class="absolute w-full h-full object-cover select-none pointer-events-none opacity-0 origin-center">
                    
                    <!-- 下嵌套框 -->
                    <div id="center-box-bottom" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-white shadow-[0_4px_25px_rgba(139,115,85,0.2)] overflow-hidden cursor-move border border-white/10" style="width: 112px; height: 112px;">
                        <img id="stage-bottom-fg-img" src="" class="absolute w-full h-full object-cover select-none pointer-events-none opacity-0 origin-center">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 1. UI 模块 (控制面板) -->
    <div class="w-full lg:w-[380px] bg-white border-t lg:border-t-0 lg:border-r border-[#EFEAE2] p-5 flex flex-col gap-4 shrink-0 overflow-y-auto max-h-[50vh] lg:max-h-screen lg:h-screen no-scrollbar z-30 shadow-[0_-10px_30px_rgba(139,115,85,0.05)] lg:shadow-none pb-8" style="touch-action: pan-y;">
        
        <!-- 侧栏头部 -->
        <div class="hidden lg:block">
            <div class="flex items-center gap-2 mb-1">
                <span class="p-1.5 bg-[#8B7355] rounded-xl text-white">
                    <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                </span>
                <span class="text-base font-bold tracking-wider text-[#4A3E3D]">RIYAD INVERSE v3.1</span>
            </div>
            <p class="text-[11px] text-zinc-400">“你中有我，我中有你” 镜像互换排版工具</p>
            <hr class="border-[#EFEAE2] mt-4">
        </div>

        <!-- 第一步：上传 -->
        <div class="flex flex-col gap-2">
            <span class="text-[11px] font-bold text-[#8B7355] uppercase tracking-wider flex items-center gap-1">
                <i data-lucide="image-plus" class="w-3.5 h-3.5"></i> 1. 上传图片素材
            </span>
            <div class="grid grid-cols-2 gap-2.5">
                <div class="relative">
                    <input type="file" id="upload-a" accept="image/*" class="hidden">
                    <label for="upload-a" class="flex flex-col items-center justify-center h-20 border border-dashed border-[#CBBFB0] hover:border-[#8B7355] rounded-xl cursor-pointer bg-[#FAF6F0] hover:bg-[#FAF6F0]/80 transition-all overflow-hidden relative">
                        <div id="preview-container-a" class="absolute inset-0 w-full h-full hidden">
                            <img id="img-preview-a" class="w-full h-full object-cover">
                        </div>
                        <div id="placeholder-a" class="flex flex-col items-center justify-center text-center p-1">
                            <i data-lucide="plus" class="w-4 h-4 text-[#8B7355]"></i>
                            <span class="text-[11px] text-[#4A3E3D] font-medium">图 A (天空)</span>
                        </div>
                    </label>
                </div>

                <div class="relative">
                    <input type="file" id="upload-b" accept="image/*" class="hidden">
                    <label for="upload-b" class="flex flex-col items-center justify-center h-20 border border-dashed border-[#CBBFB0] hover:border-[#8B7355] rounded-xl cursor-pointer bg-[#FAF6F0] hover:bg-[#FAF6F0]/80 transition-all overflow-hidden relative">
                        <div id="preview-container-b" class="absolute inset-0 w-full h-full hidden">
                            <img id="img-preview-b" class="w-full h-full object-cover">
                        </div>
                        <div id="placeholder-b" class="flex flex-col items-center justify-center text-center p-1">
                            <i data-lucide="plus" class="w-4 h-4 text-[#8B7355]"></i>
                            <span class="text-[11px] text-[#4A3E3D] font-medium">图 B (海洋)</span>
                        </div>
                    </label>
                </div>
            </div>
        </div>

        <!-- 第二步：画布比例 -->
        <div class="flex flex-col gap-1.5">
            <span class="text-[11px] font-bold text-[#8B7355] uppercase tracking-wider flex items-center gap-1">
                <i data-lucide="aspect-ratio" class="w-3.5 h-3.5"></i> 2. 整体画幅比例
            </span>
            <div class="grid grid-cols-3 gap-1.5">
                <button onclick="LayerManager.setRatio('1-1')" id="btn-ratio-1-1" class="py-1.5 text-xs rounded-full bg-[#8B7355] text-white font-bold transition-all cream-button shadow-sm">1:1 正方形</button>
                <button onclick="LayerManager.setRatio('3-4')" id="btn-ratio-3-4" class="py-1.5 text-xs rounded-full bg-[#FAF6F0] text-[#4A3E3D] hover:bg-[#EFEAE2] transition-all cream-button">3:4 小红书</button>
                <button onclick="LayerManager.setRatio('9-16')" id="btn-ratio-9-16" class="py-1.5 text-xs rounded-full bg-[#FAF6F0] text-[#4A3E3D] hover:bg-[#EFEAE2] transition-all cream-button">9:16 长图</button>
            </div>
        </div>

        <!-- 第三步：细节微调 -->
        <div class="flex flex-col gap-2.5">
            <span class="text-[11px] font-bold text-[#8B7355] uppercase tracking-wider flex items-center gap-1">
                <i data-lucide="sliders" class="w-3.5 h-3.5"></i> 3. 精细节距微调
            </span>

            <!-- 中心嵌套框大小 -->
            <div class="bg-[#FAF6F0] p-3 rounded-2xl border border-[#EFEAE2]">
                <div class="flex justify-between text-xs text-[#4A3E3D] mb-1 font-medium">
                    <span>中心嵌套框大小 (Size)</span>
                    <span id="center-size-val" class="text-[#8B7355] font-bold">35%</span>
                </div>
                <input type="range" id="input-center-size" min="20" max="60" value="35" class="w-full h-1 bg-zinc-200 rounded-lg appearance-none cursor-pointer accent-[#8B7355]">
            </div>

            <!-- 当前激活图层状态显示 -->
            <div class="bg-[#FAF6F0] p-3 rounded-2xl border border-[#EFEAE2] flex flex-col gap-2">
                <div class="flex justify-between items-center">
                    <span class="text-[11px] font-bold text-[#4A3E3D] flex items-center gap-1">
                        <i data-lucide="layers-3" class="w-3.5 h-3.5 text-[#8B7355]"></i> 当前选中图层
                    </span>
                    <span id="active-layer-indicator" class="text-[10px] px-2.5 py-0.5 rounded-full bg-[#8B7355] text-white font-bold">上背景 (图A)</span>
                </div>
                
                <div class="grid grid-cols-2 gap-2 mt-1">
                    <button onclick="GestureManager.setActiveLayer('topBg')" id="tab-topBg" class="py-1 text-[10px] rounded-lg bg-[#8B7355] text-white font-semibold transition-all">上背景</button>
                    <button onclick="GestureManager.setActiveLayer('topFg')" id="tab-topFg" class="py-1 text-[10px] rounded-lg bg-white border border-[#EFEAE2] text-[#4A3E3D] font-semibold transition-all">上嵌套</button>
                    <button onclick="GestureManager.setActiveLayer('bottomBg')" id="tab-bottomBg" class="py-1 text-[10px] rounded-lg bg-white border border-[#EFEAE2] text-[#4A3E3D] font-semibold transition-all">下背景</button>
                    <button onclick="GestureManager.setActiveLayer('bottomFg')" id="tab-bottomFg" class="py-1 text-[10px] rounded-lg bg-white border border-[#EFEAE2] text-[#4A3E3D] font-semibold transition-all">下嵌套</button>
                </div>

                <!-- 激活图层的专属拉杆 -->
                <div class="mt-2 pt-2 border-t border-[#EFEAE2]/60">
                    <div class="flex justify-between text-[11px] text-[#4A3E3D] mb-1 font-medium">
                        <span>所选图层缩放系数 (Scale)</span>
                        <span id="active-scale-val" class="text-[#8B7355] font-bold">1.0x</span>
                    </div>
                    <input type="range" id="input-active-scale" min="1.0" max="4.0" step="0.05" value="1.0" class="w-full h-1 bg-zinc-200 rounded-lg appearance-none cursor-pointer accent-[#8B7355]">
                </div>
            </div>

            <!-- 圆角 & 噪点双调节 -->
            <div class="grid grid-cols-2 gap-2">
                <div class="bg-[#FAF6F0] p-2.5 rounded-2xl border border-[#EFEAE2] flex flex-col justify-between">
                    <div class="flex justify-between text-[11px] text-[#4A3E3D] mb-1 font-semibold">
                        <span>圆角 (Corner)</span>
                        <span id="radius-val" class="text-[#8B7355]">0px</span>
                    </div>
                    <input type="range" id="input-radius" min="0" max="24" value="0" class="w-full h-1 bg-zinc-200 rounded-lg appearance-none cursor-pointer accent-[#8B7355]">
                </div>
                <div class="bg-[#FAF6F0] p-2.5 rounded-2xl border border-[#EFEAE2] flex flex-col justify-between">
                    <div class="flex justify-between text-[11px] text-[#4A3E3D] mb-1 font-semibold">
                        <span>噪点 (Grain)</span>
                        <span id="grain-val" class="text-[#8B7355]">6%</span>
                    </div>
                    <input type="range" id="input-grain" min="0" max="15" value="6" class="w-full h-1 bg-zinc-200 rounded-lg appearance-none cursor-pointer accent-[#8B7355]">
                </div>
            </div>
        </div>

        <!-- 确认导出 -->
        <div class="mt-2 pt-1 lg:mt-auto">
            <button id="btn-download" class="w-full bg-[#8B7355] hover:bg-[#725E45] text-white font-bold py-3.5 px-4 rounded-full shadow-lg shadow-[#8B7355]/10 flex items-center justify-center gap-2 transition-all cream-button">
                <i data-lucide="download" class="w-4 h-4"></i>
                <span class="text-xs tracking-wider">保存到手机相册 (防黑防白版)</span>
            </button>
        </div>
    </div>

    <!-- 隐藏式 Canvas 渲染底板 -->
    <canvas id="export-canvas" class="hidden"></canvas>

    <!-- 手机长按保存美观悬浮窗 -->
    <div id="mobile-download-modal" class="fixed inset-0 bg-black/85 z-50 flex flex-col items-center justify-center p-6 transition-all duration-300 opacity-0 pointer-events-none">
        <button onclick="UI.closeDownloadModal()" class="absolute top-6 right-6 text-zinc-400 hover:text-white bg-zinc-800/80 p-2.5 rounded-full cream-button">
            <i data-lucide="x" class="w-6 h-6"></i>
        </button>
        <div class="text-center max-w-sm flex flex-col items-center gap-4">
            <div class="w-12 h-12 bg-amber-500/10 border border-amber-500/30 text-amber-400 rounded-full flex items-center justify-center">
                <i data-lucide="sparkles" class="w-6 h-6"></i>
            </div>
            <div>
                <h3 class="text-base font-bold text-white">长按下方图片保存至相册</h3>
                <p class="text-xs text-zinc-400 mt-1">100% 拒绝黑屏。如遇长按无响应，可使用浏览器自带截屏功能</p>
            </div>
            <div class="relative bg-zinc-900 border border-zinc-800 rounded-2xl overflow-hidden shadow-2xl max-h-[55vh] max-w-full">
                <img id="modal-download-img" class="w-auto h-auto max-h-[50vh] mx-auto object-contain select-all" src="" alt="长按保存图片">
                <div class="absolute inset-0 bg-black/10 pointer-events-none flex items-center justify-center">
                    <span class="bg-black/60 text-white text-[10px] px-3 py-1 rounded-full border border-white/10">长按下方图片 📥</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ----------------------------------------------------
        // 1. Theme (主题与美学底座)
        // ----------------------------------------------------
        const Theme = {
            init() {
                // 用于设置初始渲染动画以及胶片噪点系数
                const sheet = document.styleSheets[0];
                const rules = sheet.cssRules || sheet.rules;
                this.grainRule = Array.from(rules).find(r => r.selectorText === '.grain-overlay::after');
            },
            setGrainOpacity(val) {
                if (this.grainRule) {
                    this.grainRule.style.opacity = val;
                }
            }
        };

        // ----------------------------------------------------
        // 2. LayerManager (图层核心管理系统)
        // ----------------------------------------------------
        const LayerManager = {
            state: {
                imageA: null, // 图A实际 Image 节点
                imageB: null, // 图B实际 Image 节点
                ratio: '1-1', // 1-1 | 3-4 | 9-16
                centerSize: 35, // 20 - 60
                radius: 0,
                grainOpacity: 0.06,

                // 四个图层的拖拽定位偏移量 (50, 50代表完美居中)
                offsetTopBg: { x: 50, y: 50 },
                offsetTopFg: { x: 50, y: 50 },
                offsetBottomBg: { x: 50, y: 50 },
                offsetBottomFg: { x: 50, y: 50 },

                // 四个图层独立的缩放尺度
                scaleTopBg: 1.0,
                scaleTopFg: 1.0,
                scaleBottomBg: 1.0,
                scaleBottomFg: 1.0
            },

            setRatio(ratio) {
                this.state.ratio = ratio;
                UI.adaptWorkspaceScale();
                
                ['1-1', '3-4', '9-16'].forEach(r => {
                    const btn = document.getElementById(`btn-ratio-${r}`);
                    if (r === ratio) {
                        btn.className = "py-1.5 text-xs rounded-full bg-[#8B7355] text-white font-bold transition-all cream-button shadow-sm";
                    } else {
                        btn.className = "py-1.5 text-xs rounded-full bg-[#FAF6F0] text-[#4A3E3D] hover:bg-[#EFEAE2] transition-all cream-button";
                    }
                });
                Renderer.syncToDOM();
                Storage.autoSave();
            },

            loadSampleAssets() {
                const workspacePlaceholder = document.getElementById('workspace-placeholder');
                workspacePlaceholder.querySelector('h3').textContent = "正在调配精美摄影图...";
                
                // 完全合规、高斯过滤的安全无损环境摄影图
                const sampleA = "https://images.unsplash.com/photo-1517841905240-472988babdf9?auto=format&fit=crop&w=800&q=80"; // 人像/焦点
                const sampleB = "https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=800&q=80"; // 纯净海洋/海浪背景

                let loaded = 0;
                const checkAndRun = () => {
                    loaded++;
                    if (loaded === 2) {
                        workspacePlaceholder.classList.add('opacity-0', 'pointer-events-none');
                        Renderer.syncToDOM();
                        Storage.autoSave();
                    }
                };

                const imgA = new Image();
                imgA.crossOrigin = "anonymous";
                imgA.onload = () => {
                    this.state.imageA = imgA;
                    document.getElementById('img-preview-a').src = sampleA;
                    document.getElementById('preview-container-a').classList.remove('hidden');
                    document.getElementById('placeholder-a').classList.add('hidden');
                    checkAndRun();
                };
                imgA.src = sampleA;

                const imgB = new Image();
                imgB.crossOrigin = "anonymous";
                imgB.onload = () => {
                    this.state.imageB = imgB;
                    document.getElementById('img-preview-b').src = sampleB;
                    document.getElementById('preview-container-b').classList.remove('hidden');
                    document.getElementById('placeholder-b').classList.add('hidden');
                    checkAndRun();
                };
                imgB.src = sampleB;
            }
        };

        // ----------------------------------------------------
        // 3. UI 交互管理器
        // ----------------------------------------------------
        const UI = {
            init() {
                this.workspace = document.getElementById('workspace');
                this.workspacePlaceholder = document.getElementById('workspace-placeholder');
                this.inputCenterSize = document.getElementById('input-center-size');
                this.inputRadius = document.getElementById('input-radius');
                this.inputGrain = document.getElementById('input-grain');
                this.btnDownload = document.getElementById('btn-download');
                
                this.inputActiveScale = document.getElementById('input-active-scale');

                // 绑定上传
                document.getElementById('upload-a').addEventListener('change', (e) => this.handleLocalUpload(e, 'A'));
                document.getElementById('upload-b').addEventListener('change', (e) => this.handleLocalUpload(e, 'B'));

                // 绑定常规参数
                this.inputCenterSize.addEventListener('input', (e) => {
                    LayerManager.state.centerSize = parseInt(e.target.value);
                    document.getElementById('center-size-val').textContent = LayerManager.state.centerSize + '%';
                    Renderer.syncToDOM();
                    Storage.autoSave();
                });

                this.inputRadius.addEventListener('input', (e) => {
                    LayerManager.state.radius = parseInt(e.target.value);
                    document.getElementById('radius-val').textContent = LayerManager.state.radius + 'px';
                    Renderer.syncToDOM();
                    Storage.autoSave();
                });

                this.inputGrain.addEventListener('input', (e) => {
                    const grainVal = parseInt(e.target.value);
                    LayerManager.state.grainOpacity = grainVal / 100;
                    document.getElementById('grain-val').textContent = grainVal + '%';
                    Theme.setGrainOpacity(LayerManager.state.grainOpacity);
                    Storage.autoSave();
                });

                // 绑定专属激活图层缩放条
                this.inputActiveScale.addEventListener('input', (e) => {
                    const scale = parseFloat(e.target.value);
                    const layer = GestureManager.activeLayer;
                    
                    if (layer === 'topBg') LayerManager.state.scaleTopBg = scale;
                    else if (layer === 'topFg') LayerManager.state.scaleTopFg = scale;
                    else if (layer === 'bottomBg') LayerManager.state.scaleBottomBg = scale;
                    else if (layer === 'bottomFg') LayerManager.state.scaleBottomFg = scale;

                    document.getElementById('active-scale-val').textContent = scale.toFixed(1) + 'x';
                    Renderer.syncToDOM();
                    Storage.autoSave();
                });

                this.btnDownload.addEventListener('click', ExportEngine.generate);
            },

            adaptWorkspaceScale() {
                const container = this.workspace.parentElement;
                const containerW = container.clientWidth;
                const containerH = container.clientHeight;

                let targetW = 400;
                let targetH = 400;

                if (LayerManager.state.ratio === '3-4') {
                    targetW = 360;
                    targetH = 480;
                } else if (LayerManager.state.ratio === '9-16') {
                    targetW = 320;
                    targetH = 568;
                }

                let scale = 1;
                const scaleX = (containerW - 24) / targetW;
                const scaleY = (containerH - 24) / targetH;
                scale = Math.min(scaleX, scaleY, 1);

                this.workspace.style.width = `${targetW * scale}px`;
                this.workspace.style.height = `${targetH * scale}px`;
            },

            handleLocalUpload(event, type) {
                const file = event.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        if (type === 'A') {
                            LayerManager.state.imageA = img;
                            document.getElementById('img-preview-a').src = e.target.result;
                            document.getElementById('preview-container-a').classList.remove('hidden');
                            document.getElementById('placeholder-a').classList.add('hidden');
                        } else {
                            LayerManager.state.imageB = img;
                            document.getElementById('img-preview-b').src = e.target.result;
                            document.getElementById('preview-container-b').classList.remove('hidden');
                            document.getElementById('placeholder-b').classList.add('hidden');
                        }

                        if (LayerManager.state.imageA && LayerManager.state.imageB) {
                            this.workspacePlaceholder.classList.add('opacity-0', 'pointer-events-none');
                        }
                        Renderer.syncToDOM();
                        Storage.autoSave();
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            },

            closeDownloadModal() {
                const modal = document.getElementById('mobile-download-modal');
                modal.classList.add('opacity-0', 'pointer-events-none');
            }
        };

        // ----------------------------------------------------
        // 4. GestureManager (多端手势交互管理器)
        // ----------------------------------------------------
        const GestureManager = {
            activeLayer: 'topBg', // 当前操控层 'topBg' | 'topFg' | 'bottomBg' | 'bottomFg'
            startX: 0,
            startY: 0,
            initialOffset: { x: 50, y: 50 },
            startDistance: 0,
            initialScale: 1.0,
            isDragging: false,

            init() {
                this.setupDOMEvents();
            },

            setActiveLayer(layer) {
                this.activeLayer = layer;
                
                // 1. 同步选项卡高亮
                ['topBg', 'topFg', 'bottomBg', 'bottomFg'].forEach(l => {
                    const tab = document.getElementById(`tab-${l}`);
                    if (l === layer) {
                        tab.className = "py-1 text-[10px] rounded-lg bg-[#8B7355] text-white font-semibold transition-all";
                    } else {
                        tab.className = "py-1 text-[10px] rounded-lg bg-white border border-[#EFEAE2] text-[#4A3E3D] font-semibold transition-all";
                    }
                });

                // 2. 更新指示灯文字
                const transMap = {
                    'topBg': '上背景 (图A)',
                    'topFg': '上嵌套 (图B)',
                    'bottomBg': '下背景 (图B)',
                    'bottomFg': '下嵌套 (图A)'
                };
                document.getElementById('active-layer-indicator').textContent = transMap[layer];

                // 3. 将对应缩放比映射到滑杆中
                let scaleVal = 1.0;
                if (layer === 'topBg') scaleVal = LayerManager.state.scaleTopBg;
                else if (layer === 'topFg') scaleVal = LayerManager.state.scaleTopFg;
                else if (layer === 'bottomBg') scaleVal = LayerManager.state.scaleBottomBg;
                else if (layer === 'bottomFg') scaleVal = LayerManager.state.scaleBottomFg;

                UI.inputActiveScale.value = scaleVal;
                document.getElementById('active-scale-val').textContent = scaleVal.toFixed(1) + 'x';

                // 4. 同步更新边框闪烁高亮
                this.highlightWorkspaceBorder();
            },

            highlightWorkspaceBorder() {
                // 清洗全场
                document.getElementById('stage-top-bg-img').classList.remove('drag-highlight');
                document.getElementById('center-box-top').classList.remove('drag-highlight');
                document.getElementById('stage-bottom-bg-img').classList.remove('drag-highlight');
                document.getElementById('center-box-bottom').classList.remove('drag-highlight');

                if (this.activeLayer === 'topBg') document.getElementById('stage-top-bg-img').classList.add('drag-highlight');
                else if (this.activeLayer === 'topFg') document.getElementById('center-box-top').classList.add('drag-highlight');
                else if (this.activeLayer === 'bottomBg') document.getElementById('stage-bottom-bg-img').classList.add('drag-highlight');
                else if (this.activeLayer === 'bottomFg') document.getElementById('center-box-bottom').classList.add('drag-highlight');
            },

            getTouchDistance(touches) {
                const dx = touches[0].clientX - touches[1].clientX;
                const dy = touches[0].clientY - touches[1].clientY;
                return Math.sqrt(dx * dx + dy * dy);
            },

            setupDOMEvents() {
                const onStart = (e, targetLayer) => {
                    if (e.cancelable) e.preventDefault();
                    this.setActiveLayer(targetLayer);
                    this.isDragging = true;

                    const touches = e.touches;
                    if (touches && touches.length === 2) {
                        this.startDistance = this.getTouchDistance(touches);
                        if (targetLayer === 'topBg') this.initialScale = LayerManager.state.scaleTopBg;
                        else if (targetLayer === 'topFg') this.initialScale = LayerManager.state.scaleTopFg;
                        else if (targetLayer === 'bottomBg') this.initialScale = LayerManager.state.scaleBottomBg;
                        else if (targetLayer === 'bottomFg') this.initialScale = LayerManager.state.scaleBottomFg;
                        return;
                    }

                    const pt = touches ? touches[0] : e;
                    this.startX = pt.clientX;
                    this.startY = pt.clientY;

                    if (targetLayer === 'topBg') this.initialOffset = { ...LayerManager.state.offsetTopBg };
                    else if (targetLayer === 'topFg') this.initialOffset = { ...LayerManager.state.offsetTopFg };
                    else if (targetLayer === 'bottomBg') this.initialOffset = { ...LayerManager.state.offsetBottomBg };
                    else if (targetLayer === 'bottomFg') this.initialOffset = { ...LayerManager.state.offsetBottomFg };
                };

                const onMove = (e) => {
                    if (!this.isDragging) return;
                    if (e.cancelable) e.preventDefault();

                    const touches = e.touches;
                    // 处理移动端双指手势
                    if (touches && touches.length === 2) {
                        const dist = this.getTouchDistance(touches);
                        if (this.startDistance > 0) {
                            const scale = Math.max(1.0, Math.min(4.0, this.initialScale * (dist / this.startDistance)));
                            
                            if (this.activeLayer === 'topBg') LayerManager.state.scaleTopBg = scale;
                            else if (this.activeLayer === 'topFg') LayerManager.state.scaleTopFg = scale;
                            else if (this.activeLayer === 'bottomBg') LayerManager.state.scaleBottomBg = scale;
                            else if (this.activeLayer === 'bottomFg') LayerManager.state.scaleBottomFg = scale;

                            document.getElementById('active-scale-val').textContent = scale.toFixed(1) + 'x';
                            UI.inputActiveScale.value = scale;
                        }
                        Renderer.syncToDOM();
                        return;
                    }

                    // 处理平移
                    const pt = touches ? touches[0] : e;
                    const dx = pt.clientX - this.startX;
                    const dy = pt.clientY - this.startY;

                    const wsW = parseFloat(UI.workspace.style.width || 320);
                    const scaleFactorW = wsW * 0.8;
                    const scaleFactorH = wsW * 0.4;

                    // 融入当前图层缩放度阻尼
                    let scaleVal = 1.0;
                    if (this.activeLayer === 'topBg') scaleVal = LayerManager.state.scaleTopBg;
                    else if (this.activeLayer === 'topFg') scaleVal = LayerManager.state.scaleTopFg;
                    else if (this.activeLayer === 'bottomBg') scaleVal = LayerManager.state.scaleBottomBg;
                    else if (this.activeLayer === 'bottomFg') scaleVal = LayerManager.state.scaleBottomFg;

                    const chgX = (dx / scaleFactorW) * 100 / scaleVal;
                    const chgY = (dy / scaleFactorH) * 100 / scaleVal;

                    if (this.activeLayer === 'topBg') {
                        LayerManager.state.offsetTopBg.x = Math.max(0, Math.min(100, this.initialOffset.x - chgX));
                        LayerManager.state.offsetTopBg.y = Math.max(0, Math.min(100, this.initialOffset.y - chgY));
                    } else if (this.activeLayer === 'topFg') {
                        LayerManager.state.offsetTopFg.x = Math.max(0, Math.min(100, this.initialOffset.x - chgX));
                        LayerManager.state.offsetTopFg.y = Math.max(0, Math.min(100, this.initialOffset.y - chgY));
                    } else if (this.activeLayer === 'bottomBg') {
                        LayerManager.state.offsetBottomBg.x = Math.max(0, Math.min(100, this.initialOffset.x - chgX));
                        LayerManager.state.offsetBottomBg.y = Math.max(0, Math.min(100, this.initialOffset.y - chgY));
                    } else if (this.activeLayer === 'bottomFg') {
                        LayerManager.state.offsetBottomFg.x = Math.max(0, Math.min(100, this.initialOffset.x - chgX));
                        LayerManager.state.offsetBottomFg.y = Math.max(0, Math.min(100, this.initialOffset.y - chgY));
                    }

                    Renderer.syncToDOM();
                };

                const onEnd = () => {
                    if (this.isDragging) {
                        this.isDragging = false;
                        Storage.autoSave();
                    }
                };

                // 滚轮缩放支持
                const onWheel = (e, layer) => {
                    e.preventDefault();
                    this.setActiveLayer(layer);
                    const factor = -e.deltaY * 0.0015;
                    
                    if (layer === 'topBg') LayerManager.state.scaleTopBg = Math.max(1.0, Math.min(4.0, LayerManager.state.scaleTopBg + factor));
                    else if (layer === 'topFg') LayerManager.state.scaleTopFg = Math.max(1.0, Math.min(4.0, LayerManager.state.scaleTopFg + factor));
                    else if (layer === 'bottomBg') LayerManager.state.scaleBottomBg = Math.max(1.0, Math.min(4.0, LayerManager.state.scaleBottomBg + factor));
                    else if (layer === 'bottomFg') LayerManager.state.scaleBottomFg = Math.max(1.0, Math.min(4.0, LayerManager.state.scaleBottomFg + factor));

                    this.setActiveLayer(layer); // 刷新滑块
                    Renderer.syncToDOM();
                    Storage.autoSave();
                };

                // 绑定上半大背景
                const topBg = document.getElementById('part-top-bg');
                topBg.addEventListener('mousedown', (e) => {
                    if (e.target === topBg || e.target.id === 'stage-top-bg-img') onStart(e, 'topBg');
                });
                topBg.addEventListener('touchstart', (e) => {
                    if (e.target === topBg || e.target.id === 'stage-top-bg-img') onStart(e, 'topBg');
                }, {passive: false});
                topBg.addEventListener('wheel', (e) => onWheel(e, 'topBg'), {passive: false});

                // 绑定下半大背景
                const bottomBg = document.getElementById('part-bottom-bg');
                bottomBg.addEventListener('mousedown', (e) => {
                    if (e.target === bottomBg || e.target.id === 'stage-bottom-bg-img') onStart(e, 'bottomBg');
                });
                bottomBg.addEventListener('touchstart', (e) => {
                    if (e.target === bottomBg || e.target.id === 'stage-bottom-bg-img') onStart(e, 'bottomBg');
                }, {passive: false});
                bottomBg.addEventListener('wheel', (e) => onWheel(e, 'bottomBg'), {passive: false});

                // 绑定中心盒 top
                const boxTop = document.getElementById('center-box-top');
                boxTop.addEventListener('mousedown', (e) => onStart(e, 'topFg'));
                boxTop.addEventListener('touchstart', (e) => onStart(e, 'topFg'), {passive: false});
                boxTop.addEventListener('wheel', (e) => onWheel(e, 'topFg'), {passive: false});

                // 绑定中心盒 bottom
                const boxBottom = document.getElementById('center-box-bottom');
                boxBottom.addEventListener('mousedown', (e) => onStart(e, 'bottomFg'));
                boxBottom.addEventListener('touchstart', (e) => onStart(e, 'bottomFg'), {passive: false});
                boxBottom.addEventListener('wheel', (e) => onWheel(e, 'bottomFg'), {passive: false});

                // 挂载全局监听
                window.addEventListener('mousemove', onMove);
                window.addEventListener('touchmove', onMove, {passive: false});
                window.addEventListener('mouseup', onEnd);
                window.addEventListener('touchend', onEnd);
            }
        };

        // ----------------------------------------------------
        // 5. Renderer (实时视图同步渲染器)
        // ----------------------------------------------------
        const Renderer = {
            syncToDOM() {
                const state = LayerManager.state;
                const currentWidth = parseFloat(UI.workspace.style.width || 320);
                const boxSize = currentWidth * (state.centerSize / 100);

                // 1. 设置中心卡片大小与圆角
                [document.getElementById('center-box-top'), document.getElementById('center-box-bottom')].forEach(box => {
                    box.style.width = `${boxSize}px`;
                    box.style.height = `${boxSize}px`;
                    box.style.borderRadius = `${state.radius}px`;
                });

                // 2. 将图片与矩阵效果刷到 DOM 节点上
                if (state.imageA) {
                    const topBgImg = document.getElementById('stage-top-bg-img');
                    topBgImg.src = document.getElementById('img-preview-a').src;
                    topBgImg.classList.add('opacity-100');
                    topBgImg.style.objectPosition = `${state.offsetTopBg.x}% ${state.offsetTopBg.y}%`;
                    topBgImg.style.transform = `scale(${state.scaleTopBg})`;

                    const bottomFgImg = document.getElementById('stage-bottom-fg-img');
                    bottomFgImg.src = document.getElementById('img-preview-a').src;
                    bottomFgImg.classList.add('opacity-100');
                    bottomFgImg.style.objectPosition = `${state.offsetBottomFg.x}% ${state.offsetBottomFg.y}%`;
                    bottomFgImg.style.transform = `scale(${state.scaleBottomFg})`;
                }

                if (state.imageB) {
                    const bottomBgImg = document.getElementById('stage-bottom-bg-img');
                    bottomBgImg.src = document.getElementById('img-preview-b').src;
                    bottomBgImg.classList.add('opacity-100');
                    bottomBgImg.style.objectPosition = `${state.offsetBottomBg.x}% ${state.offsetBottomBg.y}%`;
                    bottomBgImg.style.transform = `scale(${state.scaleBottomBg})`;

                    const topFgImg = document.getElementById('stage-top-fg-img');
                    topFgImg.src = document.getElementById('img-preview-b').src;
                    topFgImg.classList.add('opacity-100');
                    topFgImg.style.objectPosition = `${state.offsetTopFg.x}% ${state.offsetTopFg.y}%`;
                    topFgImg.style.transform = `scale(${state.scaleTopFg})`;
                }
            }
        };

        // ----------------------------------------------------
        // 6. ExportEngine (免网络加载、防黑防白导出引擎)
        // ----------------------------------------------------
        const ExportEngine = {
            async generate() {
                const state = LayerManager.state;
                if (!state.imageA || !state.imageB) {
                    const alertBox = document.createElement('div');
                    alertBox.className = "fixed top-12 left-1/2 -translate-x-1/2 bg-[#8B7355] text-white font-bold px-6 py-3 rounded-full shadow-xl z-50 transition-all text-xs tracking-wider";
                    alertBox.textContent = "请先导入图A和图B才可以生成哦！";
                    document.body.appendChild(alertBox);
                    setTimeout(() => alertBox.remove(), 2500);
                    return;
                }

                const origHTML = UI.btnDownload.innerHTML;
                UI.btnDownload.innerHTML = `<i data-lucide="loader" class="w-4 h-4 animate-spin"></i><span class="text-xs">无损大图直接导出中...</span>`;
                lucide.createIcons();

                // 输出无损 1600px 画质高清晰画面
                let outW = 1600;
                let outH = 1600;

                if (state.ratio === '3-4') {
                    outW = 1600;
                    outH = 2133;
                } else if (state.ratio === '9-16') {
                    outW = 1440;
                    outH = 2560;
                }

                const canvas = document.getElementById('export-canvas');
                canvas.width = outW;
                canvas.height = outH;
                const ctx = canvas.getContext('2d');

                const midY = outH / 2;

                // 核心重构：100% 对齐 W3C 的 object-position 的无缝定位缩放逻辑
                const drawLayerToCanvas = (img, x, y, w, h, offset, scale) => {
                    ctx.save();
                    ctx.beginPath();
                    ctx.rect(x, y, w, h);
                    ctx.clip(); // 强制裁切限定本层边界

                    const imgRatio = img.width / img.height;
                    const destRatio = w / h;
                    let drawW, drawH, drawX, drawY;

                    if (imgRatio > destRatio) {
                        drawH = h * scale;
                        drawW = h * imgRatio * scale;
                    } else {
                        drawW = w * scale;
                        drawH = w / imgRatio * scale;
                    }

                    // 完全基于 (底图缩放尺寸 - 容器物理尺寸) * 偏移百分比 完美映射
                    drawX = x + (w - drawW) * (offset.x / 100);
                    drawY = y + (h - drawH) * (offset.y / 100);

                    ctx.drawImage(img, drawX, drawY, drawW, drawH);
                    ctx.restore();
                };

                // 1. 绘制上半部背景 (直接画原图，省去二次网络请求)
                drawLayerToCanvas(state.imageA, 0, 0, outW, midY, state.offsetTopBg, state.scaleTopBg);

                // 2. 绘制下半部背景
                drawLayerToCanvas(state.imageB, 0, midY, outW, midY, state.offsetBottomBg, state.scaleBottomBg);

                // 3. 计算并绘制对称中心嵌套框
                const boxSize = outW * (state.centerSize / 100);
                const radiusPx = state.radius * (outW / 320); // 圆角等比放大

                // 绘制上半嵌套 (图B)
                ctx.save();
                const topBoxX = outW / 2 - boxSize / 2;
                const topBoxY = midY / 2 - boxSize / 2;

                // 投影
                ctx.shadowColor = 'rgba(139, 115, 85, 0.25)';
                ctx.shadowBlur = 40 * (outW / 1200);
                ctx.shadowOffsetY = 10 * (outW / 1200);

                ctx.fillStyle = '#FFFFFF';
                ExportEngine.drawRoundedRect(ctx, topBoxX, topBoxY, boxSize, boxSize, radiusPx);
                ctx.fill();

                ctx.shadowColor = 'transparent'; // 去除阴影以免叠在图上
                ctx.clip();

                drawLayerToCanvas(state.imageB, topBoxX, topBoxY, boxSize, boxSize, state.offsetTopFg, state.scaleTopFg);
                ctx.restore();

                // 绘制下半嵌套 (图A)
                ctx.save();
                const bottomBoxX = outW / 2 - boxSize / 2;
                const bottomBoxY = midY + (midY / 2) - boxSize / 2;

                ctx.shadowColor = 'rgba(139, 115, 85, 0.25)';
                ctx.shadowBlur = 40 * (outW / 1200);
                ctx.shadowOffsetY = 10 * (outW / 1200);

                ctx.fillStyle = '#FFFFFF';
                ExportEngine.drawRoundedRect(ctx, bottomBoxX, bottomBoxY, boxSize, boxSize, radiusPx);
                ctx.fill();

                ctx.shadowColor = 'transparent';
                ctx.clip();

                drawLayerToCanvas(state.imageA, bottomBoxX, bottomBoxY, boxSize, boxSize, state.offsetBottomFg, state.scaleBottomFg);
                ctx.restore();

                // 4. 叠加噪点
                if (state.grainOpacity > 0) {
                    ctx.save();
                    ctx.fillStyle = `rgba(255, 255, 255, ${state.grainOpacity / 1.5})`;
                    for (let i = 0; i < outW; i += 3) {
                        for (let j = 0; j < outH; j += 3) {
                            if (Math.random() > 0.5) {
                                ctx.fillRect(i, j, 1.5, 1.5);
                            }
                        }
                    }
                    ctx.restore();
                }

                // 5. 唤醒保存模式
                setTimeout(() => {
                    try {
                        const dataURL = canvas.toDataURL('image/png');
                        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
                        
                        if (isMobile) {
                            document.getElementById('modal-download-img').src = dataURL;
                            document.getElementById('mobile-download-modal').classList.remove('opacity-0', 'pointer-events-none');
                        } else {
                            const link = document.createElement('a');
                            link.download = `riyad_inverse_v3_1_${Date.now()}.png`;
                            link.href = dataURL;
                            document.body.appendChild(link);
                            link.click();
                            document.body.removeChild(link);
                        }
                    } catch (e) {
                        const dataURL = canvas.toDataURL('image/png');
                        document.getElementById('modal-download-img').src = dataURL;
                        document.getElementById('mobile-download-modal').classList.remove('opacity-0', 'pointer-events-none');
                    } finally {
                        UI.btnDownload.innerHTML = origHTML;
                        lucide.createIcons();
                    }
                }, 400);
            },

            drawRoundedRect(ctx, x, y, width, height, radius) {
                if (radius === 0) {
                    ctx.rect(x, y, width, height);
                    return;
                }
                ctx.beginPath();
                ctx.moveTo(x + radius, y);
                ctx.lineTo(x + width - radius, y);
                ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
                ctx.lineTo(x + width, y + height - radius);
                ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
                ctx.lineTo(x + radius, y + height);
                ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
                ctx.lineTo(x, y + radius);
                ctx.quadraticCurveTo(x, y, x + radius, y);
                ctx.closePath();
            }
        };

        // ----------------------------------------------------
        // 7. Storage (本地自动持久化归档管理器)
        // ----------------------------------------------------
        const Storage = {
            autoSave() {
                const config = {
                    ratio: LayerManager.state.ratio,
                    centerSize: LayerManager.state.centerSize,
                    radius: LayerManager.state.radius,
                    grainOpacity: LayerManager.state.grainOpacity,
                    offsetTopBg: LayerManager.state.offsetTopBg,
                    offsetTopFg: LayerManager.state.offsetTopFg,
                    offsetBottomBg: LayerManager.state.offsetBottomBg,
                    offsetBottomFg: LayerManager.state.offsetBottomFg,
                    scaleTopBg: LayerManager.state.scaleTopBg,
                    scaleTopFg: LayerManager.state.scaleTopFg,
                    scaleBottomBg: LayerManager.state.scaleBottomBg,
                    scaleBottomFg: LayerManager.state.scaleBottomFg
                };
                localStorage.setItem('riyad_inverse_v3_draft', JSON.stringify(config));
            },

            loadDraft() {
                const raw = localStorage.getItem('riyad_inverse_v3_draft');
                if (!raw) return;
                try {
                    const parsed = JSON.parse(raw);
                    Object.assign(LayerManager.state, parsed);
                    
                    // 恢复表单数值显示
                    UI.inputCenterSize.value = LayerManager.state.centerSize;
                    document.getElementById('center-size-val').textContent = LayerManager.state.centerSize + '%';

                    UI.inputRadius.value = LayerManager.state.radius;
                    document.getElementById('radius-val').textContent = LayerManager.state.radius + 'px';

                    UI.inputGrain.value = Math.round(LayerManager.state.grainOpacity * 100);
                    document.getElementById('grain-val').textContent = Math.round(LayerManager.state.grainOpacity * 100) + '%';

                    LayerManager.setRatio(LayerManager.state.ratio);
                } catch (e) {
                    console.warn("读取本地配置草稿箱失败: ", e);
                }
            }
        };

        // ----------------------------------------------------
        // 系统生命周期注册
        // ----------------------------------------------------
        window.addEventListener('DOMContentLoaded', () => {
            Theme.init();
            UI.init();
            GestureManager.init();
            Storage.loadDraft();
            
            // 初始化高亮
            GestureManager.setActiveLayer('topBg');
            
            // 延迟自适应
            setTimeout(() => {
                UI.adaptWorkspaceScale();
                Renderer.syncToDOM();
            }, 100);
        });
    </script>
</body>
</html>
